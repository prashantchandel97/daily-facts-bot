name: Daily Facts

on:
  schedule:
    - cron: '0 13 * * *'   # 8 AM CDT
    - cron: '0 16 * * *'   # 11 AM CDT
    - cron: '0 19 * * *'   # 2 PM CDT
    - cron: '0 22 * * *'   # 5 PM CDT
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv tweepy

      - name: Post to X and send Telegram brief
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 facts_publisher.py

      - name: Commit send log
        run: |
          git config user.email "facts-bot@users.noreply.github.com"
          git config user.name "Daily Facts Bot"
          git add briefs/ || true
          git diff --staged --quiet && echo "Nothing to log" || \
            git commit -m "Log: posted $(date +'%b %d %H:%M UTC')" && git pull --rebase && git push
